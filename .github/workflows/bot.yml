name: Run Discord Bot 24/7 (ish)

on:
  schedule:
    # GitHub Action runs max for 6 hours before it's killed. 
    # This cron restarts it every 6 hours automatically.
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub website

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Run for maximum 6 hours

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          ERP_USER: ${{ secrets.ERP_USER }}
          ERP_PASSWORD: ${{ secrets.ERP_PASSWORD }}
        run: |
          python bot2.0.py
